<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — OpportunityFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f4f1ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      padding: 2.5rem;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 13px; color: #94a3b8; margin-bottom: 1.5rem; }
    h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
    p.sub { font-size: 14px; color: #64748b; margin-bottom: 1.5rem; }
    .field-wrap { position: relative; margin-bottom: 0.75rem; }
    input {
      width: 100%;
      padding: 0.75rem;
      padding-right: 3.5rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    .toggle-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }
    .message {
      font-size: 13px;
      margin-bottom: 0.75rem;
      display: none;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
    }
    .message.error   { color: #dc2626; background: #fef2f2; }
    .message.success { color: #059669; background: #f0fdf4; }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover    { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">◎ OpportunityFinder</div>
  <h1>Set new password</h1>
  <p class="sub">Choose a strong password for your account.</p>

  <div class="field-wrap">
    <input id="pw-new" type="password" placeholder="New password (min 6 characters)" />
    <button class="toggle-btn" type="button" onclick="toggleVis('pw-new', 'btn-show-new')" id="btn-show-new">Show</button>
  </div>

  <div class="field-wrap">
    <input id="pw-confirm" type="password" placeholder="Confirm new password" />
    <button class="toggle-btn" type="button" onclick="toggleVis('pw-confirm', 'btn-show-confirm')" id="btn-show-confirm">Show</button>
  </div>

  <p id="msg" class="message"></p>

  <button class="btn-primary" id="btn-submit" onclick="handleReset()" disabled>Update password</button>
  <a class="back-link" href="/">Back to OpportunityFinder</a>
</div>

<script>
  // ── Supabase init ──────────────────────────────────────────────────────────
  const SUPABASE_URL      = "https://gymzfpzinruiupirnmiy.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bXpmcHppbnJ1aXVwaXJubWl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDYzMTcsImV4cCI6MjA4OTgyMjMxN30.Ol2nad3ZaW_RtOXs9RJTf9ameltMTKh93u4zp2MJXR8";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // When the user lands here from the reset email, Supabase puts the recovery
  // token in the URL hash. The SDK reads it automatically and fires
  // PASSWORD_RECOVERY — at that point the user is temporarily "logged in"
  // just enough to call updateUser().
  sb.auth.onAuthStateChange((event, session) => {
    if (event === "PASSWORD_RECOVERY") {
      // User arrived via reset link — enable the form
      document.getElementById("btn-submit").disabled = false;
    }
  });

  // ── Reset handler ──────────────────────────────────────────────────────────
  async function handleReset() {
    const pw      = document.getElementById("pw-new").value;
    const confirm = document.getElementById("pw-confirm").value;
    const msgEl   = document.getElementById("msg");
    const btn     = document.getElementById("btn-submit");

    msgEl.className = "message";
    msgEl.style.display = "none";

    if (!pw || pw.length < 6) {
      showMsg("Password must be at least 6 characters.", "error");
      return;
    }
    if (pw !== confirm) {
      showMsg("Passwords do not match.", "error");
      return;
    }

    btn.textContent = "Updating...";
    btn.disabled = true;

    const { error } = await sb.auth.updateUser({ password: pw });

    if (error) {
      showMsg(error.message, "error");
      btn.textContent = "Update password";
      btn.disabled = false;
    } else {
      showMsg("Password updated! Redirecting you to the app...", "success");
      setTimeout(() => window.location.href = "/", 2000);
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function toggleVis(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if (input.type === "password") {
      input.type = "text";
      btn.textContent = "Hide";
    } else {
      input.type = "password";
      btn.textContent = "Show";
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById("msg");
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = "block";
  }
</script>

</body>
</html>
